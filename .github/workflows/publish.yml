name: Publish bottles

on:
  pull_request_target:
    types:
      - labeled

jobs:
  publish:
    if: contains(github.event.pull_request.labels.*.name, 'pr-pull')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Sync tap with PR branch
        run: |
          TAP_PATH="$(brew --repository)/Library/Taps/${{ github.repository }}"
          cp -f Formula/*.rb "${TAP_PATH}/Formula/"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Download bottle artifacts
        run: |
          WORKFLOW="tests.yml"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          # Find the successful workflow run for this PR's head commit
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/${WORKFLOW}/runs?head_sha=${HEAD_SHA}&status=success" \
            --jq '.workflow_runs[0].id')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::No successful test run found for commit ${HEAD_SHA}"
            exit 1
          fi

          echo "Downloading artifacts from run ${RUN_ID}"
          gh run download "$RUN_ID" --dir bottles/

      - name: Add bottle blocks to formulae
        run: |
          # Move all bottle files to current directory
          find bottles/ -name "*.bottle.*" -exec mv {} . \;
          rmdir bottles/*/ 2>/dev/null; rmdir bottles/ 2>/dev/null

          # Generate bottle block and apply to formulae
          for json in *.bottle.json; do
            [ -f "$json" ] || continue
            brew bottle --merge --write --no-commit "$json"
          done

          # Copy updated formulae back from tap to our checkout
          TAP_PATH="$(brew --repository)/Library/Taps/${{ github.repository }}"
          cp -f "${TAP_PATH}/Formula/"*.rb Formula/

      - name: Upload bottles to GitHub Release
        run: |
          for json in *.bottle.json; do
            [ -f "$json" ] || continue
            # Extract formula name and version from JSON
            FORMULA=$(ruby -rjson -e 'j=JSON.parse(File.read(ARGV[0])); puts j.keys.first' "$json")
            VERSION=$(ruby -rjson -e 'j=JSON.parse(File.read(ARGV[0])); puts j.values.first["formula"]["pkg_version"]' "$json")
            TAG="${FORMULA}-${VERSION}"

            # Create release if it doesn't exist
            gh release create "$TAG" --title "$TAG" --notes "Bottles for ${FORMULA} ${VERSION}" 2>/dev/null || true

            # Upload bottle tarballs
            for tarball in *.tar.gz; do
              [ -f "$tarball" ] || continue
              gh release upload "$TAG" "$tarball" --clobber 2>/dev/null || true
            done
          done

      - name: Commit bottle blocks
        run: |
          git add Formula/*.rb
          if git diff --cached --quiet; then
            echo "No bottle changes to commit"
          else
            git commit -m "Add bottle blocks for PR #${PR_NUMBER}"
            git push
          fi

      - name: Merge PR
        run: gh pr merge "$PR_NUMBER" --merge --delete-branch
